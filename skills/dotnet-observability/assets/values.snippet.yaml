# Merge into the chart's values.yaml.

# Add to the existing `service:` block — the metrics-only port Kestrel listens
# on (see Program.cs). ServiceMonitor scrapes it; the ingress never sees it.
service:
  metricsPort: 9090

# Prometheus discovery — creates a ServiceMonitor CRD that the
# kube-prometheus-stack operator picks up automatically (it watches all
# namespaces). Disable where prometheus-operator isn't installed.
serviceMonitor:
  enabled: true
  interval: "60s"
  scrapeTimeout: "10s"

# Grafana dashboards — provisioned via a ConfigMap labeled
# `grafana_dashboard: "1"`, auto-discovered and loaded by the cluster's
# Grafana. The JSON lives in dashboards/ next to the chart so the dashboards
# travel with the app they monitor.
#   - goldenSignals: the metrics dashboard (needs the OTel/Prometheus work).
#   - logs:          the Loki logs dashboard (needs the Serilog JSON logging
#                    work + a cluster Loki/Alloy stack). Off by default so a
#                    metrics-only install doesn't ship a logs dashboard that
#                    would read "No data".
dashboards:
  enabled: true
  goldenSignals: true
  logs: false
