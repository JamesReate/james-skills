{{- if .Values.dashboards.enabled }}
# Grafana dashboard ConfigMap. The kube-prometheus-stack Grafana instance
# auto-discovers ConfigMaps labeled `grafana_dashboard: "1"` in any namespace
# and loads the JSON. Lives in the same namespace as the app it monitors so
# its lifecycle matches the deployment — `helm uninstall` removes the dashboard
# alongside the app.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "__CHART__.fullname" . }}-dashboards
  labels:
    {{- include "__CHART__.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  # The filename MUST be globally unique. The Grafana sidecar
  # (kiwigrid/k8s-sidecar) flattens every discovered ConfigMap's data files
  # into a single /tmp/dashboards/ directory — a generic name like
  # `golden-signals.json` collides across apps (last-writer-wins) and the
  # dashboard silently never appears. Prefix with the app name.
  __APP__-golden-signals.json: |-
    {{- .Files.Get "dashboards/golden-signals.json" | nindent 4 }}
{{- end }}
